spring.application.name=KitchenComplianceHub
spring.application.name=KitchenComplianceHub
server.shutdown=graceful
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true
gg.jte.templateLocation=src/main/jte
gg.jte.templateSuffix=.jte
gg.jte.developmentMode=true
gg.jte.trimControlStructures=true

app.site.base-url=http://localhost:8080
app.site.title=KitchenComplianceHub
app.site.default-state=tx
app.attribution.enabled=true
app.attribution.log-dir=${APP_ATTRIBUTION_LOG_DIR:${user.home}/.kitchencompliancehub/attribution}
app.leads.enabled=true
app.leads.log-dir=${APP_LEAD_LOG_DIR:${user.home}/.kitchencompliancehub/leads}
app.ops.audit-dir=${APP_OPS_AUDIT_DIR:${user.home}/.kitchencompliancehub/ops}
app.ops.freshness-audit-enabled=${APP_FRESHNESS_AUDIT_ENABLED:true}
app.ops.freshness-audit-cron=${APP_FRESHNESS_AUDIT_CRON:0 15 6 * * *}
app.ops.freshness-audit-zone=${APP_FRESHNESS_AUDIT_ZONE:UTC}
